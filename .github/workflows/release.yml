name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -trimpath -o dist/dtsw-linux-${{ matrix.goarch }} ./cmd/dtsw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtsw-linux-${{ matrix.goarch }}
          path: dist/dtsw-linux-${{ matrix.goarch }}

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release files
        run: |
          chmod +x install.sh
          cp install.sh dist/install.sh
          cd dist
          sha256sum dtsw-linux-amd64 dtsw-linux-arm64 > checksums.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dtsw-linux-amd64
            dist/dtsw-linux-arm64
            dist/checksums.txt
            dist/install.sh
